upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    
    # Timeout settings for upstream (increased to allow slower backends)
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;
    proxy_buffering off;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /health/ready {
        access_log off;
        proxy_pass http://backend_upstream/api/v1/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Proxy API requests to backend container
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Error handling
        error_page 502 503 504 /502.html;
    }

    # Uploaded media fallback: try volume first, then backend proxy
    location /uploads/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri @backend_uploads;
    }

    location @backend_uploads {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Error page for upstream errors
    location = /502.html {
        default_type application/json;
        return 502 '{"error":"Backend service temporarily unavailable. Please try again.","error_code":"SERVICE_UNAVAILABLE"}';
    }
}
