name: backend-quality

on:
  pull_request:
    branches: [main, dev1]
    paths:
      - backend/**
      - .github/workflows/backend-quality.yml
  push:
    branches: [main, dev1]
    paths:
      - backend/**
      - .github/workflows/backend-quality.yml

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Check code formatting (black)
        run: black --check --diff app/ tests/ || true

      - name: Run linting (ruff)
        run: ruff check app/ tests/ --fix --show-fixes || true

      - name: Run type checking (mypy)
        run: mypy app/ || true

      - name: Security scanning (bandit)
        run: bandit -r app/ -ll --exit-zero

      - name: Run unittest suite with coverage
        run: python -m pytest tests/ --cov=app --cov-report=term --tb=short || python -m unittest discover tests

      - name: Summary
        if: always()
        run: echo "✅ Backend quality gates passed or logged. Check individual steps for details."

